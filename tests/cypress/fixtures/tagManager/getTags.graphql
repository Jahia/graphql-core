query GetTags($siteKey: String!, $fieldSorter: FieldSorterInput) {
    admin {
        jahia {
            tagManager(siteKey: $siteKey) {
                tags(fieldSorter: $fieldSorter) {
                    nodes {
                        name
                        occurrences
                    }
                }
            }
        }
    }
}
