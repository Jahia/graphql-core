query GetTags($siteKey: String!, $sortBy: TagManagerSortBy, $sortOrder: SortType) {
    admin {
        jahia {
            tagManager(siteKey: $siteKey) {
                tags(sortBy: $sortBy, sortOrder: $sortOrder) {
                    nodes {
                        name
                        occurrences
                    }
                }
            }
        }
    }
}
