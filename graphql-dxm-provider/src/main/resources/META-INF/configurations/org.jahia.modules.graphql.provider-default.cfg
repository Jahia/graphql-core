# default configuration - won't be overriden
#
# Config file for GraphQL dxm provider.
#

#
# List of permissions to be checked for specific GraphQL types and fields.
# Format is like: permission.{TYPE}.{FIELD} = {PERMISSION}
# Where:
#   {TYPE}:         is the GraphQL type ( ex: Query, JCRNode, GenericJCRNode, etc.. )
#                   Inheritance is possible between types ( ex: GenericJCRNode inherit of all JCRNode permission properties ),
#                   unless GenericJCRNode redefine permission properties for some specific fields.
#                   example of inheritance and override:
#
#                   permission.JCRNode.* = graphQlNodeReadPermission
#                   permission.GenericJCRNode.getSite = graphQlSiteReadPermission
#
#   {FIELD}:        is the GraphQL field from the previous type, wildcard is allowed if you want to restrict access
#                   to all the fields of a specific type. Combination of named field and wildcard is possible, a named field
#                   will always override the wildcard permission.
#                   For example, if we want to restrict all the Query type fields using one permission for all the fields, and
#                   a different permission for a specific field:
#
#                   permission.Query.* = graphQLQueryAccessPermission
#                   permission.Query.getNodesByPath = graphQLNodesByPathPermission
#
#   {PERMISSION}:   is the permission name that will be use to check the access to previously defined type and field(s)
#                   permissions are always checked on the root JCR node.
#
# permission.JCRQuery.* = jcr:read
#
#
# List of allowed origin for CORS access :
#
# http.cors.allow-origin=http://mysite1.com, http://mysite2.com
graphql.fields.node.limit = 5000

# Query-cost guards (defence against unauthenticated amplification / DoS).
# The graphql-java parser caps (grammar depth, token count) only bound the textual shape of a document, not the work
# it triggers: a query can stay under those caps yet still fan out to thousands of resolver invocations. The guards
# below reject such documents *before* execution (before any field is fetched, permission-checked or serialized).
# Both are read only from this default configuration file so that a third-party module cannot loosen them.
#
# graphql.query.maxComplexity: maximum complexity of a query, where every field counts as 1 (e.g. a query aliasing
#   a single scalar 4000 times has a complexity of 4000). A query whose total complexity exceeds this value is
#   rejected. Result-set size (list/connection fan-out) is bounded separately by graphql.fields.node.limit above.
# graphql.query.maxDepth: maximum nesting depth of a query (defence in depth, complements the complexity guard).
#
# Set 0 on either property to disable that specific guard. The values below are enabled by default: they are wide
# enough to pass legitimate traffic (schema introspection, jContent/page-composer queries) with headroom, while
# rejecting pathological amplification and deeply-nested documents. Raise them per deployment if a legitimate query
# is ever rejected (the error message reports the measured value vs. the limit), or set 0 to opt out entirely.
graphql.query.maxComplexity = 2000
graphql.query.maxDepth = 30

# Controls access to GraphQL introspection queries (requires graphql-dxm-provider >= 3.5.0)
# Behavior:
#   - Multiple configuration files may define this property.
#   - If ANY configuration file sets introspectionCheckEnabled=true, the feature is considered enabled globally.
# When enabled (true):
#   - Introspection queries are restricted to users having the permission: developerToolsAccess.
# When disabled (false):
#   - Introspection queries are allowed for all users with no permission checks.
# Default (not set): false, to preserve backward-compatible behavior.
# Recommended: set to true for improved security on introspection access.
introspectionCheckEnabled=true
